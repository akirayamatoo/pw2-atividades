<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Conta Bancária</title>
</head>
<body>
    <h2>Inserir Dados da Conta Bancária</h2>
    <form action="criar_xml.php" method="POST">
        <label>Agência:</label><br>
        <input type="text" name="agencia" required><br><br>

        <label>Conta Corrente:</label><br>
        <input type="text" name="conta" required><br><br>

        <label>Nome do Cliente:</label><br>
        <input type="text" name="nome_cliente" required><br><br>

        <label>Saldo Atual (R$):</label><br>
        <input type="number" step="0.01" name="saldo_atual" required><br><br>

        <label>Última Movimentação:</label><br>
        <input type="text" name="ultima_movimentacao" placeholder="Ex: + R$ 150.00 de Pix" required><br><br>

        <button type="submit">Gerar Arquivo XML</button>
    </form>
</body>
</html>
